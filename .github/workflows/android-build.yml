name: Build N1GHT D3CK APK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build N1GHT D3CK APK
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Gradle 8.11.1
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.11.1"
          cache-disabled: true

      - name: Locate or extract Android project
        id: project
        shell: bash
        run: |
          set -euo pipefail

          if [[ -f settings.gradle || -f settings.gradle.kts ]]; then
            PROJECT_ROOT="$GITHUB_WORKSPACE"
          else
            ZIP_FILE="$(find "$GITHUB_WORKSPACE" -maxdepth 1 -type f -iname '*.zip' -print -quit)"

            if [[ -z "$ZIP_FILE" ]]; then
              echo "No Android project or source ZIP was found."
              exit 1
            fi

            echo "Using source ZIP: $ZIP_FILE"

            EXTRACT_DIR="$RUNNER_TEMP/nightdeck-source"
            rm -rf "$EXTRACT_DIR"
            mkdir -p "$EXTRACT_DIR"
            unzip -q "$ZIP_FILE" -d "$EXTRACT_DIR"

            SETTINGS_FILE="$(find "$EXTRACT_DIR" -type f \( -name settings.gradle -o -name settings.gradle.kts \) -print -quit)"

            if [[ -z "$SETTINGS_FILE" ]]; then
              echo "No settings.gradle or settings.gradle.kts was found."
              exit 1
            fi

            PROJECT_ROOT="$(dirname "$SETTINGS_FILE")"
          fi

          echo "root=$PROJECT_ROOT" >> "$GITHUB_OUTPUT"
          echo "Android project root: $PROJECT_ROOT"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        shell: bash
        run: |
          set -euo pipefail

          yes | sdkmanager --licenses >/dev/null || true

          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Show build toolchain
        shell: bash
        run: |
          set -euo pipefail

          java -version
          gradle --version
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-}"
          command -v sdkmanager
          sdkmanager --list_installed | sed -n '1,120p'

      - name: Generate official Gradle wrapper
        working-directory: ${{ steps.project.outputs.root }}
        shell: bash
        run: |
          set -euo pipefail

          gradle wrapper \
            --gradle-version 8.11.1 \
            --distribution-type bin

          chmod +x gradlew
          ./gradlew --version

      - name: Build debug APK
        working-directory: ${{ steps.project.outputs.root }}
        shell: bash
        run: |
          set -euo pipefail

          ./gradlew \
            --no-daemon \
            assembleDebug \
            --stacktrace

      - name: Collect APK and checksum
        working-directory: ${{ steps.project.outputs.root }}
        shell: bash
        run: |
          set -euo pipefail

          APK_FILE="$(find app/build/outputs/apk/debug -type f -name '*.apk' -print -quit)"

          if [[ -z "$APK_FILE" ]]; then
            echo "Gradle did not produce a debug APK."
            exit 1
          fi

          OUTPUT_DIR="$GITHUB_WORKSPACE/github-build-output"
          mkdir -p "$OUTPUT_DIR"

          FINAL_APK="$OUTPUT_DIR/N1GHT-D3CK-0.1.0-debug.apk"

          cp "$APK_FILE" "$FINAL_APK"

          sha256sum "$FINAL_APK" \
            | tee "$OUTPUT_DIR/N1GHT-D3CK-0.1.0-checksums.txt"

          ls -lh "$FINAL_APK"

      - name: Validate APK package
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail

          OUTPUT_DIR="$GITHUB_WORKSPACE/github-build-output"
          APK="$OUTPUT_DIR/N1GHT-D3CK-0.1.0-debug.apk"
          TOOLS="$ANDROID_HOME/build-tools/36.0.0"

          "$TOOLS/apksigner" verify \
            --verbose \
            --print-certs \
            "$APK" \
            | tee "$OUTPUT_DIR/apksigner-verification.txt"

          "$TOOLS/zipalign" -c -v 4 "$APK" \
            | tee "$OUTPUT_DIR/zipalign-verification.txt"

          "$TOOLS/aapt2" dump badging "$APK" \
            | tee "$OUTPUT_DIR/aapt2-badging.txt"

      - name: Run unit tests
        continue-on-error: true
        working-directory: ${{ steps.project.outputs.root }}
        shell: bash
        run: |
          ./gradlew \
            --no-daemon \
            test \
            --stacktrace

      - name: Run Android lint
        continue-on-error: true
        working-directory: ${{ steps.project.outputs.root }}
        shell: bash
        run: |
          ./gradlew \
            --no-daemon \
            lint \
            --stacktrace

      - name: Upload APK and build evidence
        uses: actions/upload-artifact@v7
        with:
          name: N1GHT-D3CK-0.1.0-debug
          path: |
            github-build-output/N1GHT-D3CK-0.1.0-debug.apk
            github-build-output/N1GHT-D3CK-0.1.0-checksums.txt
            github-build-output/apksigner-verification.txt
            github-build-output/zipalign-verification.txt
            github-build-output/aapt2-badging.txt
          if-no-files-found: error
          retention-days: 14